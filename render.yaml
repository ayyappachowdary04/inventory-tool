services:
  - type: web
    name: wineshop-backend
    env: python
    region: ohio
    plan: free
    repo: https://github.com/ayyappachowdary04/inventory-tool.git
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "6543"
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        value: "postgres"
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
